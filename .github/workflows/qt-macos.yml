# Build a Qt project on macOS
name: Build on macOS

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build:
    if: false # Disable for now

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v2
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '5.12.12'
        target: 'desktop'
        modules: 'gui core serialport network opengl xml'
    - name: qmake
      run: qmake .
    - name: make
      run: make
    - name: make check
      run: make check

#    - name: make distcheck
#      run: make distcheck
