# Build MyMapMap on Ubuntu and package a self-contained AppImage.
#
# Built on Ubuntu 26.04, whose distro Qt is 6.10 — new enough for MyMapMap,
# which requires Qt 6.8+ (VideoExporter uses QVideoFrameInput /
# QAudioBufferInput). Note: an AppImage built here needs a glibc at least as
# new as Ubuntu 26.04's; build on an older release if you need wider reach.
name: Build on Ubuntu

on:
  workflow_dispatch:
  push:
    branches: [ dev, main, master ]
  pull_request:
    branches: [ dev, main, master ]

jobs:
  build:
    runs-on: ubuntu-26.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          qt6-base-dev \
          qt6-base-private-dev \
          qt6-multimedia-dev \
          qt6-tools-dev \
          libqt6opengl6-dev \
          libqt6openglwidgets6 \
          libgl1-mesa-dev \
          libfuse2 \
          wget \
          file
        # Optional MCP server module — ignore if the package is unavailable.
        sudo apt-get install -y libqt6httpserver6-dev || true

    - name: Configure (CMake + Ninja)
      run: cmake -B build-linux -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build-linux

    - name: Package AppImage
      run: bash ./scripts/sh_make_appimage.sh

    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyMapMap-AppImage
        path: MyMapMap-*-x86_64.AppImage
        if-no-files-found: error

    - name: Build and run tests
      continue-on-error: true
      run: |
        cd tests/
        qmake6 tests.pro
        make -j$(nproc)
        QT_QPA_PLATFORM=offscreen make check
