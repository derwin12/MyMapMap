# Build MyMapMap on Ubuntu and package a self-contained AppImage.
#
# MyMapMap requires Qt 6.8+ (VideoExporter uses QVideoFrameInput /
# QAudioBufferInput), which is newer than the Qt shipped with Ubuntu 24.04,
# so we install an official Qt 6.8 instead of the distro packages.
name: Build on Ubuntu

on:
  workflow_dispatch:
  push:
    branches: [ dev, main, master ]
  pull_request:
    branches: [ dev, main, master ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libxkbcommon-dev \
          libvulkan-dev \
          libfuse2 \
          wget \
          file

    - name: Install Qt 6.8
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        modules: 'qtmultimedia qthttpserver'
        cache: true

    - name: Configure (CMake + Ninja)
      run: cmake -B build-linux -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build-linux

    - name: Package AppImage
      run: bash ./scripts/sh_make_appimage.sh

    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyMapMap-AppImage
        path: MyMapMap-*-x86_64.AppImage
        if-no-files-found: error

    - name: Build and run tests
      continue-on-error: true
      run: |
        cd tests/
        qmake tests.pro
        make -j$(nproc)
        QT_QPA_PLATFORM=offscreen make check
