name: Release (Windows MSVC)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        shell: cmd
        run: build_msvc2022.bat

      - name: Deploy Qt dependencies
        shell: cmd
        run: C:\Qt\6.11.1\msvc2022_64\bin\windeployqt.exe --release --no-system-d3d-compiler bin\mymapmap.exe

      - name: Determine version string
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build installer
        shell: cmd
        run: |
          if not exist installer\output mkdir installer\output
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\mymapmap.iss

      - name: Zip portable release
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path bin\* -DestinationPath "MyMapMap-$ver-win64.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MyMapMap-*-win64.zip
            installer/output/MyMapMap-*-Setup.exe
          generate_release_notes: true
